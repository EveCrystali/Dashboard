name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (.Core, .Data, tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore non-MAUI projects
        run: |
          dotnet restore src/Dashboard.Core/Dashboard.Core.csproj
          dotnet restore src/Dashboard.Data/Dashboard.Data.csproj
          dotnet restore tests/Dashboard.Core.Tests/Dashboard.Core.Tests.csproj
          dotnet restore tests/Dashboard.Data.Tests/Dashboard.Data.Tests.csproj
          dotnet restore tests/Dashboard.App.Tests/Dashboard.App.Tests.csproj

      - name: Build non-MAUI projects
        run: |
          dotnet build src/Dashboard.Core/Dashboard.Core.csproj --configuration Release --no-restore
          dotnet build src/Dashboard.Data/Dashboard.Data.csproj --configuration Release --no-restore
          dotnet build tests/Dashboard.Core.Tests/Dashboard.Core.Tests.csproj --configuration Release --no-restore
          dotnet build tests/Dashboard.Data.Tests/Dashboard.Data.Tests.csproj --configuration Release --no-restore
          dotnet build tests/Dashboard.App.Tests/Dashboard.App.Tests.csproj --configuration Release --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test tests/Dashboard.Core.Tests/Dashboard.Core.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=core.trx" --results-directory ./TestResults --collect:"XPlat Code Coverage"
          dotnet test tests/Dashboard.Data.Tests/Dashboard.Data.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=data.trx" --results-directory ./TestResults --collect:"XPlat Code Coverage"
          dotnet test tests/Dashboard.App.Tests/Dashboard.App.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=app.trx" --results-directory ./TestResults --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  build-maui-android:
    name: Build MAUI Android
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore App
        run: dotnet restore src/Dashboard.App/Dashboard.App.csproj

      - name: Build App (Debug, net10.0-android)
        run: dotnet build src/Dashboard.App/Dashboard.App.csproj --configuration Debug --framework net10.0-android --no-restore
